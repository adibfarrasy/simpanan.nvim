<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>simpanan webui</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">simpanan</div>
    <div class="actions">
      <button id="open-btn" type="button" title="Open .simp file (Ctrl+O)">Open</button>
      <button id="save-btn" type="button" title="Save active file (Ctrl+S)">Save</button>
      <button id="run-btn" type="button" title="Run selection or active file (Ctrl+Enter)" disabled>Run</button>
      <button id="connections-btn" type="button" title="Manage connections" disabled>Connections</button>
    </div>
  </header>

  <nav id="tabs" class="tabs" aria-label="Open files"></nav>

  <main class="editor-shell">
    <textarea id="editor" spellcheck="false" placeholder="Open a .simp file to start editing." disabled></textarea>
    <aside id="result-panel" class="result-panel" hidden>
      <div class="result-header">Result</div>
      <pre id="result-body"></pre>
    </aside>
  </main>

  <footer class="statusbar">
    <span id="active-path">no file open</span>
    <span id="modified-indicator"></span>
    <span id="cursor-info"></span>
    <span id="connection-status" class="connection-status">connecting…</span>
  </footer>

  <script src="/static/app.js" type="module"></script>
</body>
</html>
